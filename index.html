<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Davilindo77 | Perfil</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 400px;
        }

        .foto-perfil {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid white;
            margin-bottom: 20px;
            object-fit: cover;
        }

        h1 { margin: 10px 0; font-size: 24px; }
        p { opacity: 0.8; margin-bottom: 30px; }

        .links { display: flex; flex-direction: column; gap: 15px; }

        .link-card {
            background: white;
            color: #764ba2;
            padding: 15px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            transition: transform 0.2s;
            display: block;
        }

        .link-card:hover {
            transform: scale(1.05);
            background: #f0f0f0;
        }

        .footer { margin-top: 30px; font-size: 12px; opacity: 0.5; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://github.com/Davilindo77.png" alt="Foto" class="foto-perfil">
    
    <h1>Davilindo77</h1>
    <p>Desenvolvedor de Aplicativos PWA</p>

    <div class="links">
        <a href="https://davilindo77.github.io/bloco-de-notas-/" class="link-card" target="_blank">
            📝 Meu Bloco de Notas
        </a>
        
        <a href="https://github.com/Davilindo77" class="link-card" target="_blank">
            💻 Meu GitHub
        </a>

        <a href="#" class="link-card">
            📸 Meu Instagram (Exemplo)
        </a>
    </div>

    <div class="footer">Criado por Davilindo77 © 2026</div>
</div>

</body>
</html>
